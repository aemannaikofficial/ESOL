<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us – ESOL Education</title>
    <meta name="description"
        content="Contact ESOL Education for questions about English courses, live classes, SELT qualifications, or technical support.">
    <link rel="icon" href="https://esol.education/wp-content/uploads/2023/10/image003-100x100.png" sizes="32x32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=23">
    <style>
        .page-title-bar {
            background-color: var(--vibrant-blue);
            padding: 45px 0;
            text-align: center;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-title-bar h1 {
            color: white;
            font-size: 62px;
            font-weight: 700;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 1px;
            font-family: var(--font-heading);
        }

        .contact-section {
            padding: 100px 0;
            background-color: #fff;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }

        .contact-form {
            background: #fff;
            padding: 20px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-control {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--vibrant-blue);
        }

        @media (max-width: 992px) {
            .contact-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            .page-title-bar h1 {
                font-size: 40px;
            }
        }
    </style>
</head>

<body>

    <!-- Top Bar -->
    <div class="topbar">
        <div class="container topbar-content">
            <div class="topbar-right">
                <a href="#"><img src="https://upload.wikimedia.org/wikipedia/en/a/ae/Flag_of_the_United_Kingdom.svg"
                        alt="UK" class="topbar-flag"> English <i class="fa-solid fa-caret-down"></i></a>
                <a href="https://study.esol.education" class="topbar-login"><i class="fa-solid fa-book-reader"></i> E
                    Learning Portal</a>
            </div>
        </div>
    </div>

    <!-- Header Navigation -->
    <header>
        <div class="container nav-wrap">
            <div class="logo">
                <a href="index.html"><img src="https://esol.education/wp-content/uploads/2023/06/ESOL-icon.png"
                        alt="ESOL Logo"></a>
            </div>
            <nav>
                <ul>
                    <li><a href="how-youll-learn.html">How You'll Learn <i class="fa-solid fa-caret-down"
                                style="font-size: 0.8em; margin-left: 4px;"></i></a></li>
                    <li><a href="about-us.html">About Us</a></li>
                    <li><a href="pricing.html">Pricing</a></li>
                    <li><a href="scqf.html">SCQF</a></li>
                    <li><a href="contact-us.html" class="active-link">Contact Us</a></li>
                </ul>
            </nav>
            <div class="burger">
                <i class="fa-solid fa-bars" style="color: var(--primary-blue); font-size: 24px;"></i>
            </div>
        </div>
    </header>

    <!-- Page Title Bar -->
    <div class="page-title-bar reveal ani-fadeIn">
        <div class="container">
            <h1>CONTACT US</h1>
        </div>
    </div>

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="container">
            <div class="contact-grid">
                <!-- Left: Image -->
                <div class="reveal ani-slideInLeft">
                    <img src="https://esol.education/wp-content/uploads/2023/09/cu.png" alt="Contact Us"
                        style="width: 100%; border-radius: 20px;">
                </div>
                <!-- Right: Form -->
                <div class="reveal ani-slideInRight">
                    <form class="contact-form" onsubmit="event.preventDefault(); alert('Message sent!');">
                        <div class="form-group">
                            <input type="text" class="form-control" placeholder="Name" required>
                        </div>
                        <div class="form-group">
                            <input type="email" class="form-control" placeholder="Email" required>
                        </div>
                        <div class="form-group">
                            <textarea class="form-control" rows="6" placeholder="Message" required></textarea>
                        </div>
                        <button type="submit" class="btn-cta" style="width: 100%; border-radius: 8px;">SEND</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer" style="background-color: var(--vibrant-blue); color: white; padding: 60px 0;">
        <div class="container">
            <div class="footer-content"
                style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 30px;">
                <div class="footer-left">
                    <img src="https://esol.education/wp-content/uploads/2023/06/ESOL__1_-removebg-preview.png"
                        alt="ESOL Logo" style="height: 60px; margin-bottom: 15px;">
                    <p style="margin: 0; opacity: 0.8;">© 2024 ESOL Awards</p>
                    <p style="margin: 0; opacity: 0.8;">English for Global Opportunities</p>
                </div>
                <div class="footer-right" style="text-align: right;">
                    <a href="https://study.esol.education" class="btn-cta"
                        style="margin-bottom: 20px; display: inline-block; background: #fff; color: var(--vibrant-blue) !important;">
                        LOGIN IN <i class="fa-solid fa-user" style="margin-left: 8px;"></i>
                    </a>
                    <div class="footer-links"
                        style="display: flex; gap: 15px; font-size: 0.9rem; opacity: 0.9; justify-content: flex-end; flex-wrap: wrap;">
                        <a href="how-youll-learn.html#courses">Online English Courses</a>
                        <span>|</span>
                        <a href="how-youll-learn.html#liveclasses">Book a Class</a>
                        <span>|</span>
                        <a href="scqf.html">Assessment</a>
                        <span>|</span>
                        <a href="contact-us.html">Contact</a>
                        <span>|</span>
                        <a href="about-us.html">About Us</a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
