<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us – ESOL Education</title>
    <meta name="description"
        content="Contact ESOL Education for questions about English courses, live classes, SELT qualifications, or technical support.">

    <link rel="icon" href="https://esol.education/wp-content/uploads/2023/10/image003-100x100.png" sizes="32x32">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css?v=26">

    <style>
        .page-title-bar {
            background-color: var(--primary-blue);
            padding: 60px 0;
            text-align: center;
        }

        .page-title-bar h1 {
            color: white;
            font-size: 62px;
            font-weight: 700;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 2px;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 100px;
            padding: 100px 0;
            align-items: center;
        }

        .contact-form {
            background: #fff;
            padding: 10px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-control {
            width: 100%;
            padding: 18px 25px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: var(--font-body);
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 5px 15px rgba(10, 10, 157, 0.1);
        }

        .contact-image {
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        @media (max-width: 992px) {
            .contact-grid { grid-template-columns: 1fr; gap: 60px; }
            .page-title-bar h1 { font-size: 40px; }
        }
    </style>
</head>

<body>

    <!-- Top Bar -->
    <div class="topbar">
        <div class="container topbar-content">
            <div class="topbar-right">
                <a href="#"><img src="https://upload.wikimedia.org/wikipedia/en/a/ae/Flag_of_the_United_Kingdom.svg"
                        alt="UK" class="topbar-flag"> English <i class="fa-solid fa-caret-down"></i></a>
                <a href="https://study.esol.education" class="topbar-login">E Learning Portal</a>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header>
        <div class="container nav-wrap">
            <div class="logo">
                <a href="index.html"><img src="https://esol.education/wp-content/uploads/2023/06/ESOL-icon.png"
                        alt="ESOL Logo"></a>
            </div>
            <nav>
                <ul>
                    <li><a href="how-youll-learn.html">How You'll Learn <i class="fa-solid fa-caret-down"
                                style="font-size: 0.7em; margin-left: 5px;"></i></a></li>
                    <li><a href="about-us.html">About Us</a></li>
                    <li><a href="pricing.html">Pricing</a></li>
                    <li><a href="scqf.html">SCQF</a></li>
                    <li><a href="contact-us.html" class="active-link">Contact Us</a></li>
                </ul>
            </nav>
            <div class="burger"><i class="fa-solid fa-bars" style="font-size: 24px;"></i></div>
        </div>
    </header>

    <!-- Title Bar -->
    <div class="page-title-bar">
        <div class="container">
            <h1>CONTACT US</h1>
        </div>
    </div>

    <!-- Contact Section -->
    <section class="section">
        <div class="container">
            <div class="contact-grid">
                <div class="contact-image reveal">
                    <img src="https://esol.education/wp-content/uploads/2023/09/cu.png" alt="Contact Us" style="width: 100%; display: block;">
                </div>
                <div class="reveal">
                    <form class="contact-form" onsubmit="event.preventDefault(); alert('Message sent!');">
                        <div class="form-group">
                            <input type="text" class="form-control" placeholder="Name" required>
                        </div>
                        <div class="form-group">
                            <input type="email" class="form-control" placeholder="Email" required>
                        </div>
                        <div class="form-group">
                            <textarea class="form-control" rows="6" placeholder="Message" required></textarea>
                        </div>
                        <button type="submit" class="btn-cta" style="width: 100%; border-radius: 10px; font-size: 1.2rem;">SEND</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-left">
                    <img src="https://esol.education/wp-content/uploads/2023/06/ESOL__1_-removebg-preview.png"
                        alt="ESOL Logo">
                    <p>© 2024 ESOL Awards</p>
                    <p>English for Global Opportunities</p>
                </div>
                <div class="footer-right">
                    <a href="https://study.esol.education" class="btn-cta">LOGIN IN <i class="fa-solid fa-user"
                            style="margin-left: 10px;"></i></a>
                    <div class="footer-links">
                        <a href="how-youll-learn.html#courses">Online English Courses</a>
                        <span>|</span>
                        <a href="how-youll-learn.html#liveclasses">Book a Class</a>
                        <span>|</span>
                        <a href="scqf.html">Assessment</a>
                        <span>|</span>
                        <a href="contact-us.html">Contact</a>
                        <span>|</span>
                        <a href="about-us.html">About Us</a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
